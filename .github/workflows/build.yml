name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  OBS_VERSION: '32.1.2'
  OBS_DEPS_VERSION: '2025-07-11'

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      # Cache the compiled libobs install so rebuilds only take seconds
      - name: Restore libobs cache
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-install
          key: libobs-windows-x64-${{ env.OBS_VERSION }}

      - name: Download OBS source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/obsproject/obs-studio/archive/refs/tags/${{ env.OBS_VERSION }}.zip"
          Invoke-WebRequest $url -OutFile obs-src.zip
          Expand-Archive obs-src.zip -DestinationPath .
          Rename-Item "obs-studio-${{ env.OBS_VERSION }}" "obs-studio"

      - name: Download prebuilt OBS dependencies
        if: steps.cache-obs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/obsproject/obs-deps/releases/download/${{ env.OBS_DEPS_VERSION }}/windows-deps-${{ env.OBS_DEPS_VERSION }}-x64.zip"
          Invoke-WebRequest $url -OutFile obs-deps.zip
          Expand-Archive obs-deps.zip -DestinationPath obs-deps

      - name: Build libobs
        if: steps.cache-obs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S obs-studio -B obs-studio/build `
            -G "Visual Studio 17 2022" -A x64 `
            "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/obs-deps" `
            -DENABLE_FRONTEND=OFF `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DOBS_VERSION_OVERRIDE="${{ env.OBS_VERSION }}"
          cmake --build obs-studio/build --config RelWithDebInfo --target libobs --parallel
          cmake --install obs-studio/build --config RelWithDebInfo `
            --prefix obs-install --component Development

      - name: Configure plugin
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/obs-install"

      - name: Build plugin
        shell: pwsh
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Stage plugin files
        shell: pwsh
        run: cmake --install build --config RelWithDebInfo --prefix release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rematrix-filter-windows-x64
          path: release/
