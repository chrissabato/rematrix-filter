name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  OBS_VERSION: '32.1.2'

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Restore libobs cache
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-install
          key: libobs-windows-x64-${{ env.OBS_VERSION }}

      - name: Download OBS source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/obsproject/obs-studio/archive/refs/tags/${{ env.OBS_VERSION }}.zip"
          Invoke-WebRequest $url -OutFile obs-src.zip
          Expand-Archive obs-src.zip -DestinationPath .
          Rename-Item "obs-studio-${{ env.OBS_VERSION }}" "obs-studio"

      - name: Build libobs
        if: steps.cache-obs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S obs-studio -B obs-studio/build `
            -G "Visual Studio 17 2022" -A x64 `
            -DENABLE_FRONTEND=OFF `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DOBS_VERSION_OVERRIDE="${{ env.OBS_VERSION }}"
          cmake --build obs-studio/build --config RelWithDebInfo `
            --target libobs obs-frontend-api --parallel
          cmake --install obs-studio/build --config RelWithDebInfo `
            --prefix obs-install --component Development
          $depsDir = Get-ChildItem "obs-studio/.deps" -Directory |
            Where-Object { $_.Name -match "^obs-deps-[\d-]+-x64$" } |
            Select-Object -First 1 -ExpandProperty FullName
          Copy-Item -Recurse -Force "$depsDir/include/simde" "obs-install/include/"

      - name: Configure plugin
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/obs-install"

      - name: Build plugin
        shell: pwsh
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Stage plugin files
        shell: pwsh
        run: cmake --install build --config RelWithDebInfo --prefix release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rematrix-filter-windows-x64
          path: release/

  build-macos:
    name: macOS Universal
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Restore libobs cache
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-install
          key: libobs-macos-universal-${{ env.OBS_VERSION }}

      - name: Download OBS source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/obsproject/obs-studio/archive/refs/tags/${{ env.OBS_VERSION }}.tar.gz" \
            | tar xz
          mv "obs-studio-${{ env.OBS_VERSION }}" obs-studio

      - name: Build libobs
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          # libobs-metal is pure Swift but OBS never calls enable_language(Swift),
          # so CMake's generate step can't determine its linker language.
          # Inject it via CMAKE_PROJECT_TOP_LEVEL_INCLUDES (CMake 3.24+).
          echo 'enable_language(Swift)' > /tmp/enable-swift.cmake

          cmake -S obs-studio -B obs-studio/build \
            -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=/tmp/enable-swift.cmake \
            -DENABLE_FRONTEND=OFF \
            -DENABLE_PLUGINS=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DOBS_VERSION_OVERRIDE="${{ env.OBS_VERSION }}"
          cmake --build obs-studio/build --config RelWithDebInfo \
            --target libobs obs-frontend-api --parallel
          cmake --install obs-studio/build --config RelWithDebInfo \
            --prefix obs-install --component Development

      - name: Install SimDE
        run: |
          brew install simde
          mkdir -p obs-install/include
          cp -r "$(brew --prefix simde)/include/simde" obs-install/include/

      - name: Configure plugin
        run: |
          cmake -S . -B build \
            -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-install" \
            -Dlibobs_DIR="${{ github.workspace }}/obs-install/Frameworks/libobs.framework/Resources/cmake"

      - name: Build plugin
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Stage plugin files
        run: cmake --install build --config RelWithDebInfo --prefix release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rematrix-filter-macos-universal
          path: release/

  release:
    name: Publish latest release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    # Only publish on pushes to master, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts/rematrix-filter-windows-x64
          zip -r ../../rematrix-filter-windows-x64.zip .
          cd ../rematrix-filter-macos-universal
          zip -r ../../rematrix-filter-macos-universal.zip .

      - name: Update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -d latest 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest \
            --title "Latest Build" \
            --notes "Built from [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})." \
            --prerelease \
            rematrix-filter-windows-x64.zip \
            rematrix-filter-macos-universal.zip
